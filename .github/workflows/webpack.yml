name: Package Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package (e.g., v0.2.30)'
        required: false
        default: ''
      platforms:
        description: 'Platforms to build (comma-separated: win, mac, linux)'
        required: false
        default: 'win,mac'
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: 'true'

permissions:
  contents: write
  actions: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag or input
        id: get-version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "Error: Version must be provided via tag or workflow input"
            exit 1
          fi

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: validate-version
    if: contains(github.event.inputs.platforms, 'win') || github.event_name == 'push'

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Build app
        run: npm run build

      - name: Package Windows NSIS installer
        run: npx electron-builder --win nsis --publish never

      - name: Package Windows portable
        run: npm run package:portable

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-forge-windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: validate-version
    if: contains(github.event.inputs.platforms, 'mac') || github.event_name == 'push'

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build app
        run: npm run build

      - name: Package macOS DMG and ZIP
        run: npx electron-builder --mac dmg zip --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-forge-macos
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: validate-version
    if: contains(github.event.inputs.platforms, 'linux')

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build app
        run: npm run build

      - name: Package Linux AppImage and deb
        run: npx electron-builder --linux appimage deb --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-forge-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-version, build-windows, build-macos, build-linux]
    if: always() && (github.event_name == 'push' || github.event.inputs.create_release == 'true')
    if: ${{ !cancelled() && (github.event_name == 'push' || github.event.inputs.create_release == 'true') }}

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: hermes-forge-windows
          path: release-artifacts/windows
        continue-on-error: true

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: hermes-forge-macos
          path: release-artifacts/macos
        continue-on-error: true

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: hermes-forge-linux
          path: release-artifacts/linux
        continue-on-error: true

      - name: Collect all artifacts
        run: |
          mkdir -p final-artifacts
          find release-artifacts -type f -exec cp {} final-artifacts/ \;
          ls -la final-artifacts/

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-version.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.validate-version.outputs.version, '-') }}
          files: final-artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
